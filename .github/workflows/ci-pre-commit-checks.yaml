---
name: Pre-commit Checks

# ================================================================
# Purpose: Validate the DAIS 2026 Data Readiness Desk repo.
#
# Triggers:
#   - Pushes to main that affect project code, docs, or workflow files
#   - Pull requests to main that affect project code, docs, or workflow files
#
# Required secrets for Databricks validation:
#   - DATABRICKS_HOST
#   - DATABRICKS_CLIENT_ID
#   - DATABRICKS_CLIENT_SECRET
#
# Optional repository variable:
#   - ENABLE_DATABRICKS_STAGING_DEPLOY=1 enables guarded staging deploy on main
#
# Dependencies:
#   - Python dependencies are resolved from uv.lock
#   - Databricks CLI is installed from a pinned GitHub release when secrets exist
# ================================================================

run-name: Pre-commit Checks - ${{ github.event_name }} by @${{ github.actor }}

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ci-pre-commit-checks.yaml"
      - ".pre-commit-config.yaml"
      - "databricks.yml"
      - "docs/**"
      - "notebooks/**"
      - "pyproject.toml"
      - "README.md"
      - "src/**"
      - "tests/**"
      - "uv.lock"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/ci-pre-commit-checks.yaml"
      - ".pre-commit-config.yaml"
      - "databricks.yml"
      - "docs/**"
      - "notebooks/**"
      - "pyproject.toml"
      - "README.md"
      - "src/**"
      - "tests/**"
      - "uv.lock"

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}-${{ github.event_name }}
  cancel-in-progress: true

permissions: {}

env:
  DATABRICKS_CLI_VERSION: "1.3.0"
  HAS_DATABRICKS_AUTH: ${{ secrets.DATABRICKS_HOST != '' && secrets.DATABRICKS_CLIENT_ID != '' && secrets.DATABRICKS_CLIENT_SECRET != '' }}

jobs:
  pre-commit:
    name: Run pre-commit hooks
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: |
          set -euo pipefail
          uv sync --extra dev

      - name: Run pre-commit
        run: |
          set -euo pipefail
          uv run pre-commit run --all-files

      - name: Run tests
        run: |
          set -euo pipefail
          uv run pytest

      - name: Install pinned Databricks CLI
        if: env.HAS_DATABRICKS_AUTH == 'true'
        run: |
          set -euo pipefail
          asset="databricks_cli_${DATABRICKS_CLI_VERSION}_linux_amd64.tar.gz"
          base_url="https://github.com/databricks/cli/releases/download/v${DATABRICKS_CLI_VERSION}"
          curl -fsSLO "${base_url}/${asset}"
          curl -fsSLO "${base_url}/databricks_cli_${DATABRICKS_CLI_VERSION}_SHA256SUMS"
          grep " ${asset}$" "databricks_cli_${DATABRICKS_CLI_VERSION}_SHA256SUMS" | sha256sum -c -
          tar -xzf "${asset}"
          sudo install databricks /usr/local/bin/databricks
          databricks --version

      - name: Validate Databricks bundle
        if: env.HAS_DATABRICKS_AUTH == 'true'
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          databricks bundle validate --target dev

      - name: Deploy Databricks bundle to staging
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.HAS_DATABRICKS_AUTH == 'true' && vars.ENABLE_DATABRICKS_STAGING_DEPLOY == '1'
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          databricks bundle deploy --target staging

      - name: Write workflow summary
        if: always()
        run: |
          set -euo pipefail
          {
            echo "## Pre-commit Checks Summary"
            echo ""
            echo "- Event: ${GITHUB_EVENT_NAME}"
            echo "- Ref: ${GITHUB_REF_NAME}"
            echo "- Actor: ${GITHUB_ACTOR}"
            echo "- Databricks auth configured: ${HAS_DATABRICKS_AUTH}"
            echo "- Staging deploy enabled: ${ENABLE_DATABRICKS_STAGING_DEPLOY:-0}"
          } >> "$GITHUB_STEP_SUMMARY"
