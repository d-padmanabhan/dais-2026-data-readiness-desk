---
# Pre-commit hooks configuration
# Install: pre-commit install
# Update: pre-commit autoupdate
# Run manually: pre-commit run --all-files
repos:
  - repo: local
    hooks:
      - id: compile-python
        name: Compile Python files
        entry: python -m compileall -q src notebooks tests scripts
        language: system
        pass_filenames: false
        types: [python]
      - id: end-of-file-fixer
        name: Check files end with newline
        entry: python scripts/check_text_files.py --check final-newline
        language: system
        pass_filenames: false
      - id: trailing-whitespace
        name: Check trailing whitespace
        entry: python scripts/check_text_files.py --check trailing-whitespace
        language: system
        pass_filenames: false
      - id: black
        name: Format Python with black
        entry: black
        language: system
        args: ["--line-length=120"]
        types: [python]
      - id: isort
        name: Sort Python imports
        entry: isort
        language: system
        args: ["--profile=black", "--line-length=120"]
        types: [python]
      - id: ruff
        name: Lint Python with ruff
        entry: ruff check
        language: system
        types: [python]
      - id: bandit
        name: Scan Python security with bandit
        entry: bandit
        language: system
        args: ["-ll"]
        files: ^(src|notebooks|scripts)/.*\.py$
