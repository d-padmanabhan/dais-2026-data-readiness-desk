bundle:
  name: dais-2026-data-readiness-desk

variables:
  catalog:
    description: Unity Catalog catalog for hackathon tables.
    default: data_readiness_desk
  schema:
    description: Unity Catalog schema for bronze, silver, and gold tables.
    default: pipeline
  source_volume_path:
    description: UC Volume directory containing the source CSV files.
    default: /Volumes/${var.catalog}/bronze/files
  pincode_file:
    description: India Post PIN code directory CSV filename.
    default: india_post_pincode_directory.csv
  nfhs_file:
    description: NFHS-5 district health indicators CSV filename.
    default: nfhs5_district_health_indicators.csv
  hmis_file:
    description: HMIS 2019-20 state-grain slice CSV filename.
    default: hmis_2019_20_slice.csv
  srs_file:
    description: SRS 2020 state CSV filename.
    default: srs_2020_state.csv
  district_boundaries_file:
    description: India district boundaries GeoJSON filename.
    default: india_districts.geojson
  facilities_table:
    description: Shared Databricks table containing Virtue Foundation facilities.
    default: databricks_virtue_foundation_dataset_dais_2026.virtue_foundation_dataset.facilities

resources:
  jobs:
    virtue_foundation_pipeline:
      name: dais-2026-data-readiness-desk-${bundle.target}
      tags:
        cost_center: hackathon
        data_sensitivity: public
        environment: ${bundle.target}
        owner: data-readiness-desk-team
        pipeline: virtue-foundation-data-readiness
      tasks:
        - task_key: preflight
          notebook_task:
            notebook_path: ./notebooks/00_preflight.py
            base_parameters:
              source_volume_path: ${var.source_volume_path}
              pincode_file: ${var.pincode_file}
              nfhs_file: ${var.nfhs_file}
              hmis_file: ${var.hmis_file}
              srs_file: ${var.srs_file}
              district_boundaries_file: ${var.district_boundaries_file}
              facilities_table: ${var.facilities_table}
        - task_key: ingest_bronze
          depends_on:
            - task_key: preflight
          notebook_task:
            notebook_path: ./notebooks/01_ingest_bronze.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              source_volume_path: ${var.source_volume_path}
              pincode_file: ${var.pincode_file}
              nfhs_file: ${var.nfhs_file}
              hmis_file: ${var.hmis_file}
              facilities_table: ${var.facilities_table}
        - task_key: build_silver
          depends_on:
            - task_key: ingest_bronze
          notebook_task:
            notebook_path: ./notebooks/02_build_silver.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
        - task_key: build_gold
          depends_on:
            - task_key: build_silver
          notebook_task:
            notebook_path: ./notebooks/03_build_gold.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
        - task_key: demo_queries
          depends_on:
            - task_key: build_gold
          notebook_task:
            notebook_path: ./notebooks/04_demo_queries.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}

targets:
  dev:
    mode: development
    default: true
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
  prod:
    mode: production
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
  staging:
    mode: production
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
